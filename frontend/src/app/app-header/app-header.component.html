<header class="app-header">
  <a class="brand" routerLink="/" (click)="closeMenu()" aria-label="PortuJava - página inicial">
    <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
      <path d="M12.5 2.5c-1.6 1.6 1.6 2.9 0 4.5" fill="none" stroke="#8b949e" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M18.5 1.5c-1.6 1.6 1.6 2.9 0 4.5" fill="none" stroke="#8b949e" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M25 15.5h1.6a3.4 3.4 0 0 1 0 6.8H25" fill="none" stroke="#009c3b" stroke-width="2.2"/>
      <path d="M5.5 11.5h20v7.5a6 6 0 0 1-6 6h-8a6 6 0 0 1-6-6z" fill="#009c3b"/>
      <path d="M15.5 13.2l6.4 5-6.4 5-6.4-5z" fill="#ffdf00"/>
      <circle cx="15.5" cy="18.2" r="2.7" fill="#002776"/>
      <path d="M13 17.7c1.7-.9 3.4-.9 5 .2" fill="none" stroke="#ffffff" stroke-width="0.7"/>
      <path d="M4 27.5h23.5" stroke="#6e7681" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
    <span class="wordmark">PortuJava</span>
  </a>

  <a class="project-lab-link" routerLink="/laboratorio-repositorio" (click)="closeMenu()"
     aria-label="Abrir Laboratório de Repositório">
    <span class="project-label-full">Laboratório de Repositório</span>
    <span class="project-label-short" aria-hidden="true">Lab</span>
  </a>

  <div class="tracks-menu" [class.open]="menuOpen">
    <button type="button" class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen"
            aria-label="Abrir menu de trilhas" aria-controls="tracks-menu-panel">
      <span>Trilhas</span>
      <svg class="chevron" viewBox="0 0 12 8" aria-hidden="true"><path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <nav id="tracks-menu-panel" class="tracks-dropdown">
      @for (m of modules; track m) {
        <a routerLink="/" [fragment]="m.moduleCode" (click)="closeMenu()">
          <span class="paradigm">{{ m.paradigm }}</span>
          <span class="title">{{ m.title }}</span>
          <span class="progress">{{ m.solvedCount }}/{{ m.totalCount }}</span>
        </a>
      }
      <div class="dropdown-divider"></div>
      <button type="button" class="reset-progress" (click)="resetProgress()" [disabled]="resetting">
        {{ resetting ? 'Reiniciando...' : 'Reiniciar progresso' }}
      </button>
    </nav>
  </div>

  @if (menuOpen) {
    <div class="backdrop" (click)="closeMenu()"></div>
  }
</header>
