<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- PortuJava logo: Java-style steaming coffee cup wearing the Brazilian flag -->
  <!-- steam -->
  <path d="M12.5 2.5c-1.6 1.6 1.6 2.9 0 4.5" fill="none" stroke="#8b949e" stroke-width="1.7" stroke-linecap="round"/>
  <path d="M18.5 1.5c-1.6 1.6 1.6 2.9 0 4.5" fill="none" stroke="#8b949e" stroke-width="1.7" stroke-linecap="round"/>
  <!-- handle -->
  <path d="M25 15.5h1.6a3.4 3.4 0 0 1 0 6.8H25" fill="none" stroke="#009c3b" stroke-width="2.2"/>
  <!-- cup body: flag green -->
  <path d="M5.5 11.5h20v7.5a6 6 0 0 1-6 6h-8a6 6 0 0 1-6-6z" fill="#009c3b"/>
  <!-- flag diamond: yellow -->
  <path d="M15.5 13.2l6.4 5-6.4 5-6.4-5z" fill="#ffdf00"/>
  <!-- flag globe: blue -->
  <circle cx="15.5" cy="18.2" r="2.7" fill="#002776"/>
  <!-- globe band -->
  <path d="M13 17.7c1.7-.9 3.4-.9 5 .2" fill="none" stroke="#ffffff" stroke-width="0.7"/>
  <!-- saucer -->
  <path d="M4 27.5h23.5" stroke="#6e7681" stroke-width="2.2" stroke-linecap="round"/>
</svg>
