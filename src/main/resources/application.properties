# PortuJava Game - Application Configuration

# Local secrets/configuration. Keep .env out of Git.
spring.config.import=optional:file:.env[.properties]

# Server
# PortuJava front-end URL invariant: http://localhost:62828/
server.port=62828
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Auto-open the game in the default browser when the server is ready (dev convenience).
# Set to false on servers/CI or if you do not want a browser window to pop up.
app.open-browser=true

# Cezi Engenheiro de Software - professor (OpenRouter) tutor.
# The API key is read from OPENROUTER_API_KEY, either as an environment variable or from local .env.
# NEVER hardcode the key here and never commit it. Empty = tutor disabled (front-end falls back).
portujava.api-key=${OPENROUTER_API_KEY:}
portujava.model=${PORTUJAVA_MODEL:openai/gpt-4o-mini}
portujava.base-url=https://openrouter.ai/api/v1
portujava.referer=${PORTUJAVA_REFERER:http://localhost}

# Application
spring.application.name=portujava-game

# H2 Database (file-based: progress survives restarts)
spring.datasource.url=jdbc:h2:file:./data/portujava;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.biotechpay=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# CORS
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
