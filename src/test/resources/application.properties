# Test-only overrides: keep test runs off the real dev H2 file and off browser auto-launch.
spring.datasource.url=jdbc:h2:mem:submissiontest;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
app.open-browser=false
spring.main.banner-mode=off
spring.main.log-startup-info=false

logging.level.root=ERROR
logging.level.com.biotechpay=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.springframework=ERROR
logging.level.org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration=ERROR
